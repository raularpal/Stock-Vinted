<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinted Tracker - Añadir Stock</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="main-wrapper">
        <div class="container">
            <div class="glass-card">
                <div class="header">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h1 style="margin: 0;">📦 Añadir Stock</h1>
                        <div style="display: flex; gap: 10px;">
                            <a href="index.html"
                                style="text-decoration: none; font-size: 14px; font-weight: 600; background: linear-gradient(135deg, rgba(88, 166, 255, 0.15) 0%, rgba(88, 166, 255, 0.05) 100%); border: 1px solid rgba(88, 166, 255, 0.3); padding: 10px 18px; border-radius: 12px; color: #58a6ff; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.3s ease; backdrop-filter: blur(5px);"
                                onmouseover="this.style.background='linear-gradient(135deg, rgba(88, 166, 255, 0.25) 0%, rgba(88, 166, 255, 0.1) 100%)'; this.style.boxShadow='0 6px 20px rgba(88, 166, 255, 0.25)'; this.style.transform='translateY(-2px)';"
                                onmouseout="this.style.background='linear-gradient(135deg, rgba(88, 166, 255, 0.15) 0%, rgba(88, 166, 255, 0.05) 100%)'; this.style.boxShadow='0 4px 15px rgba(0,0,0,0.15)'; this.style.transform='translateY(0)';"
                                title="Ir Atrás">⬅️ Ir Atrás</a>
                        </div>
                    </div>
                </div>

                <form id="add-stock-form">
                    <div class="form-group">
                        <label>Producto (Modelo)</label>
                        <div id="products-grid"
                            style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
                            <!-- Products will be injected here via JS -->
                        </div>
                    </div>

                    <div class="form-group" id="product-container" style="display: none;">
                        <label for="new-product">Nombre del nuevo modelo</label>
                        <input type="text" id="new-product" placeholder="Escribe el nombre del modelo...">
                    </div>

                    <div class="form-group" id="colors-group" style="display: none;">
                        <label>Color (Sugerencias para reponer)</label>
                        <div id="colors-grid"
                            style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
                            <!-- Colors will be injected here via JS -->
                        </div>
                    </div>

                    <div class="form-group" id="color-container" style="display: none;">
                        <label for="color">Nombre del color</label>
                        <input type="text" id="color" placeholder="Escribe el color...">
                    </div>

                    <div class="form-group" id="sizes-group" style="display: none;">
                        <label>Stock Comprado (Tallas 36 - 44)</label>
                        <div id="sizes-grid"
                            style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;">
                            <!-- Checkboxes will be injected here via JS -->
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label for="price">Precio de Compra (€)</label>
                        <input type="text" inputmode="decimal" id="price" placeholder="Ej: 35,00" required
                            pattern="^\d+([.,]\d+)?$">
                    </div>

                    <button type="button" id="add-to-cart-btn" class="submit-btn" disabled>
                        <span>🛒 Añadir al Carrito</span>
                    </button>
                </form>
            </div>
        </div>

        <div class="cart-container">
            <div class="glass-card">
                <h2
                    style="font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; color: var(--text-primary);">
                    🛒 Resumen de Stock</h2>

                <div id="cart-items"
                    style="display:flex; flex-direction:column; min-height: 100px; max-height: 400px; overflow-y: auto; padding-right: 5px;">
                    <div id="empty-cart-msg"
                        style="text-align:center; color:var(--text-secondary); font-size:14px; margin:auto;">
                        El carrito está vacío
                    </div>
                </div>

                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color);">
                    <div
                        style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px; font-size: 14px;">
                        <span>Total Pares:</span>
                        <span id="cart-total-pairs">0</span>
                    </div>
                    <div
                        style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; color:var(--accent);">
                        <span>Inversión Total:</span>
                        <span id="cart-total-price">0.00 €</span>
                    </div>
                </div>

                <button type="button" id="save-all-btn" class="submit-btn" disabled
                    style="margin-top: 20px; background: var(--success);">
                    <span>🚀 Guardar Todo el Stock</span>
                    <div class="loader-spinner" style="display: none;"></div>
                </button>
                <div id="status-message" class="status-message"></div>
            </div>
        </div>
    </div>

    <script src="add-stock.js"></script>
</body>

</html>
