<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinted Tracker - Registro de Ventas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1 style="margin: 0;">👟 Stock Tracker</h1>
                    <div style="display: flex; gap: 10px;">
                        <a href="index.html"
                            style="text-decoration: none; font-size: 14px; font-weight: 600; background: linear-gradient(135deg, rgba(88, 166, 255, 0.15) 0%, rgba(88, 166, 255, 0.05) 100%); border: 1px solid rgba(88, 166, 255, 0.3); padding: 10px 18px; border-radius: 12px; color: #58a6ff; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.3s ease; backdrop-filter: blur(5px);"
                            onmouseover="this.style.background='linear-gradient(135deg, rgba(88, 166, 255, 0.25) 0%, rgba(88, 166, 255, 0.1) 100%)'; this.style.boxShadow='0 6px 20px rgba(88, 166, 255, 0.25)'; this.style.transform='translateY(-2px)';"
                            onmouseout="this.style.background='linear-gradient(135deg, rgba(88, 166, 255, 0.15) 0%, rgba(88, 166, 255, 0.05) 100%)'; this.style.boxShadow='0 4px 15px rgba(0,0,0,0.15)'; this.style.transform='translateY(0)';"
                            title="Añadir Stock">📦 Añadir Stock</a>
                    </div>
                </div>
            </div>

            <form id="sales-form">
                <div class="form-group">
                    <label for="affiliate">Vendido por (Ofi)</label>
                    <select id="affiliate" required>
                        <option value="" disabled selected>Selecciona Ofi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="product">Producto</label>
                    <select id="product" required>
                        <option value="" disabled selected>Selecciona un producto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="color">Color</label>
                    <select id="color" disabled required>
                        <option value="" disabled selected>Selecciona un color</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="size">Talla</label>
                    <select id="size" disabled required>
                        <option value="" disabled selected>Selecciona una talla</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Precio de Venta (€)</label>
                    <input type="text" inputmode="decimal" id="price" placeholder="Ej: 65,00" required
                        pattern="^\d+([.,]\d+)?$">
                </div>

                <div class="form-group">
                    <label for="date">Fecha de Venta</label>
                    <input type="date" id="date" required>
                </div>

                <button type="submit" id="save-btn" class="submit-btn">
                    <span>Guardar Venta</span>
                    <div class="loader-spinner" style="display: none;"></div>
                </button>
                <div id="status-message" class="status-message"></div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
